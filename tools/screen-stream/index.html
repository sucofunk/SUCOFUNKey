<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUCOFUNK Screen Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f0f0;
            color: #333;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .controls {
            position: fixed;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: row;
            gap: 10px;
            z-index: 1000;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        #connectBtn {
            background: #22c55e;
            color: white;
        }
        #connectBtn:hover {
            background: #16a34a;
        }
        #connectBtn.connected {
            background: #ef4444;
        }
        #connectBtn.connected:hover {
            background: #dc2626;
        }
        #saveBtn {
            background: #6b7280;
            color: white;
            display: none;
        }
        #saveBtn:hover {
            background: #4b5563;
        }
        .canvas-container {
            background: #1a1a2e;
            overflow: hidden;
            position: relative;
        }
        #deviceSvgWrapper {
            background: #f0f0f0;
        }
        #deviceSvgWrapper svg {
            display: block;
        }
        #fader-cap {
            transition: transform 0.1s ease-out;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            z-index: 10;
        }
        .stats {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #888;
        }
        .stats span {
            background: #2a2a4a;
            padding: 4px 10px;
            border-radius: 4px;
        }
        .status {
            margin-top: 10px;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
        }
        .status.info { background: #1e40af; }
        .status.success { background: #166534; }
        .status.error { background: #991b1b; }
        .debug-panel {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
        }
        .debug-panel summary {
            cursor: pointer;
            padding: 8px;
            background: #2a2a4a;
            border-radius: 4px;
            font-size: 13px;
        }
        /* Device SVG container */
        .device-container {
            position: relative;
            display: inline-block;
        }
        .device-container svg {
            display: block;
            max-width: 100%;
            height: auto;
        }
        /* Screen canvas positioned over SVG screen-area */
        #screenCanvas {
            position: absolute;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        /* LED off state - show only black frame, no fill */
        [id^="led-"].led-off {
            fill: transparent !important;
        }
        /* Key pressed state */
        .key-pressed rect,
        .key-pressed path,
        .key-pressed {
            fill: #000 !important;
        }
        /* Encoder pushed state - fill circle with black */
        [id^="encoder-"].encoder-pressed {
            fill: #000 !important;
        }
        /* Encoder rotation - dashed stroke */
        [id^="encoder-"].encoder-rotating {
            stroke-dasharray: 8 4;
        }
        /* Encoder rotation animation */
        [id^="encoder-"] {
            transition: stroke-dashoffset 0.1s linear;
        }
    </style>
</head>

// Debug logging
function log(msg, type = '') {
    const prefix = type === 'error' ? '[ERROR]' : type === 'text' ? '[TEXT]' : '[INFO]';
    console.log(`${prefix} ${msg}`);
}

// Convert RGB565 to CSS color
function rgb565ToCSS(color) {
    const r = ((color >> 11) & 0x1F) << 3;
    const g = ((color >> 5) & 0x3F) << 2;
    const b = (color & 0x1F) << 3;
    return `rgb(${r},${g},${b})`;
}

// Draw a GFX font glyph
function drawGlyph(font, charCode, x, y, color) {
    const glyphIndex = charCode - font.first;
    if (glyphIndex < 0 || glyphIndex > (font.last - font.first)) return 0;
    
    const glyph = font.glyphs[glyphIndex];
    const bitmap = font.bitmaps;
    
    let bo = glyph.o;
    const w = glyph.w;
    const h = glyph.h;
    const xo = glyph.x;
    const yo = glyph.y;
    
    // Adjust baseline - firmware sends cursor position, add half yAdvance for vertical centering
    const yBase = y + Math.floor(font.yAdvance / 2) + yo;
    
    ctx.fillStyle = rgb565ToCSS(color);
    
    let bits = 0, bit = 0;
    for (let yy = 0; yy < h; yy++) {
        for (let xx = 0; xx < w; xx++) {
            if (!(bit++ & 7)) {
                bits = bitmap[bo++];
            }
            if (bits & 0x80) {
                ctx.fillRect((x + xo + xx) * scale, (yBase + yy) * scale, scale, scale);
            }
            bits <<= 1;
        }
    }
    
    return glyph.a;
}

// Draw text using GFX font
function drawText(fontId, text, x, y, color) {
    if (fontId >= FONTS.length) fontId = 0;
    const font = FONTS[fontId];
    
    let cursorX = x;
    for (let i = 0; i < text.length; i++) {
        const charCode = text.charCodeAt(i);
        cursorX += drawGlyph(font, charCode, cursorX, y, color);
    }
}

// Track encoder rotation state (for dash offset animation)
const encoderDashOffset = { 0: 0, 1: 0, 2: 0, 3: 0 };

// Handle LED state changes
function handleLedState(ledId, state) {
    const svgId = LED_MAP[ledId];
    if (!svgId) {
        // log(`Unknown LED ID: ${ledId}`, 'error');
        return;
    }
    const el = document.getElementById(svgId);
    if (el) {
        if (state) {
            el.classList.remove('led-off');
        } else {
            el.classList.add('led-off');
        }
    }
}

// Handle key press/release events
function handleKeyEvent(keyIndex, pressed, keyType) {
    const svgId = KEY_MAP[keyIndex];
    // Debug: log key events to console
    console.log(`Key event: index=${keyIndex}, pressed=${pressed}, type=${keyType}, svgId=${svgId}`);
    
    // On any key release, clear all modifier highlights as a safety net
    // (in case a modifier release event was missed)
    if (!pressed) {
        document.getElementById('key-fn')?.classList.remove('key-pressed');
        document.getElementById('key-menu')?.classList.remove('key-pressed');
        document.getElementById('key-set')?.classList.remove('key-pressed');
    }
    
    if (!svgId) {
        return;
    }
    const el = document.getElementById(svgId);
    if (el) {
        // Check if this is an encoder button
        if (svgId.startsWith('encoder-')) {
            if (pressed) {
                el.classList.add('encoder-pressed');
            } else {
                el.classList.remove('encoder-pressed');
            }
        } else {
            if (pressed) {
                el.classList.add('key-pressed');
            } else {
                el.classList.remove('key-pressed');
            }
        }
    }
}

// Track encoder rotation timeout handles
const encoderRotateTimeouts = { 0: null, 1: null, 2: null, 3: null };

// Handle encoder rotation events
function handleEncoderEvent(encoderId, clockwise) {
    const svgId = ENCODER_MAP[encoderId];
    // Debug: log encoder events to console
    console.log(`Encoder event: id=${encoderId}, clockwise=${clockwise}, svgId=${svgId}`);
    
    if (!svgId) {
        return;
    }
    
    // Get base encoder number for tracking (0-3)
    const baseEncoderId = encoderId % 100;
    
    const el = document.getElementById(svgId);
    if (el) {
        // Add rotating class to enable dashed stroke
        el.classList.add('encoder-rotating');
        
        // Animate dash offset for rotation effect
        const delta = clockwise ? 12 : -12;
        encoderDashOffset[baseEncoderId] = (encoderDashOffset[baseEncoderId] || 0) + delta;
        
        // Apply directly to the encoder path element
        el.style.strokeDashoffset = encoderDashOffset[baseEncoderId] + 'px';
        
        // Clear existing timeout and set new one to remove dashed line after 100ms
        if (encoderRotateTimeouts[baseEncoderId]) {
            clearTimeout(encoderRotateTimeouts[baseEncoderId]);
        }
        encoderRotateTimeouts[baseEncoderId] = setTimeout(() => {
            el.classList.remove('encoder-rotating');
        }, 100);
    }
}

// Handle fader position updates
function handleFaderPosition(percent) {
    const faderCap = document.getElementById('fader-cap');
    if (!faderCap) return;
    
    // Calculate x offset based on percentage
    // The fader-cap starts at x=434.125 in the SVG (middle position)
    // The center marker of the cap aligns with FADER_MIN_X at 0% and FADER_MAX_X at 100%
    const originalX = 434.125; // Original x position of fader-cap in SVG
    const halfCapWidth = FADER_CAP_WIDTH / 2;
    const range = FADER_MAX_X - FADER_MIN_X;
    const targetX = FADER_MIN_X - halfCapWidth + (percent / 100) * range;
    const offsetX = targetX - originalX;
    
    // Update fader cap position using transform (since it's a group)
    faderCap.setAttribute('transform', `translate(${offsetX}, 0)`);
}

// Process a single command from buffer
function processCommand(data) {
    if (data.length < 1) return 0;
    
    const opcode = data[0];
    cmdCount++;
    
    // Valid command received - reset error counter (except for default case)
    const validCmd = [CMD.FILL_RECT, CMD.LINE, CMD.PIXEL, CMD.HLINE, CMD.VLINE, 
                      CMD.CIRCLE, CMD.TRIANGLE, CMD.TEXT, CMD.BITMAP, CMD.CLEAR, CMD.SYNC];
    if (validCmd.includes(opcode) && opcode !== CMD.SYNC) {
        unknownOpcodeCount = 0;
    }
    
    switch (opcode) {
        case CMD.FILL_RECT: {
            if (data.length < 11) return 0;
            const x = data[1] | (data[2] << 8);
            const y = data[3] | (data[4] << 8);
            const w = data[5] | (data[6] << 8);
            const h = data[7] | (data[8] << 8);
            const color = data[9] | (data[10] << 8);
            ctx.fillStyle = rgb565ToCSS(color);
            ctx.fillRect(x * scale, y * scale, w * scale, h * scale);
            // log(`FILL_RECT x=${x} y=${y} w=${w} h=${h}`);
            return 11;
        }
        case CMD.LINE: {
            if (data.length < 11) return 0;
            const x1 = data[1] | (data[2] << 8);
            const y1 = data[3] | (data[4] << 8);
            const x2 = data[5] | (data[6] << 8);
            const y2 = data[7] | (data[8] << 8);
            const color = data[9] | (data[10] << 8);
            ctx.strokeStyle = rgb565ToCSS(color);
            ctx.lineWidth = scale;
            ctx.beginPath();
            ctx.moveTo(x1 * scale + scale/2, y1 * scale + scale/2);
            ctx.lineTo(x2 * scale + scale/2, y2 * scale + scale/2);
            ctx.stroke();
            // log(`LINE x1=${x1} y1=${y1} x2=${x2} y2=${y2}`);
            return 11;
        }
        case CMD.PIXEL: {
            if (data.length < 7) return 0;
            const x = data[1] | (data[2] << 8);
            const y = data[3] | (data[4] << 8);
            const color = data[5] | (data[6] << 8);
            ctx.fillStyle = rgb565ToCSS(color);
            ctx.fillRect(x * scale, y * scale, scale, scale);
            return 7;
        }
        case CMD.HLINE: {
            if (data.length < 9) return 0;
            const x = data[1] | (data[2] << 8);
            const y = data[3] | (data[4] << 8);
            const w = data[5] | (data[6] << 8);
            const color = data[7] | (data[8] << 8);
            ctx.fillStyle = rgb565ToCSS(color);
            ctx.fillRect(x * scale, y * scale, w * scale, scale);
            // log(`HLINE x=${x} y=${y} w=${w}`);
            return 9;
        }
        case CMD.VLINE: {
            if (data.length < 9) return 0;
            const x = data[1] | (data[2] << 8);
            const y = data[3] | (data[4] << 8);
            const h = data[5] | (data[6] << 8);
            const color = data[7] | (data[8] << 8);
            ctx.fillStyle = rgb565ToCSS(color);
            ctx.fillRect(x * scale, y * scale, scale, h * scale);
            // log(`VLINE x=${x} y=${y} h=${h}`);
            return 9;
        }
        case CMD.CIRCLE: {
            if (data.length < 10) return 0;
            const x = data[1] | (data[2] << 8);
            const y = data[3] | (data[4] << 8);
            const r = data[5] | (data[6] << 8);
            const fill = data[7];
            const color = data[8] | (data[9] << 8);
            ctx.beginPath();
            ctx.arc(x * scale, y * scale, r * scale, 0, Math.PI * 2);
            if (fill) {
                ctx.fillStyle = rgb565ToCSS(color);
                ctx.fill();
            } else {
                ctx.strokeStyle = rgb565ToCSS(color);
                ctx.lineWidth = scale;
                ctx.stroke();
            }
            // log(`CIRCLE x=${x} y=${y} r=${r} fill=${fill}`);
            return 10;
        }
        case CMD.TRIANGLE: {
            if (data.length < 16) return 0;
            const x0 = data[1] | (data[2] << 8);
            const y0 = data[3] | (data[4] << 8);
            const x1 = data[5] | (data[6] << 8);
            const y1 = data[7] | (data[8] << 8);
            const x2 = data[9] | (data[10] << 8);
            const y2 = data[11] | (data[12] << 8);
            const fill = data[13];
            const color = data[14] | (data[15] << 8);
            ctx.beginPath();
            ctx.moveTo(x0 * scale, y0 * scale);
            ctx.lineTo(x1 * scale, y1 * scale);
            ctx.lineTo(x2 * scale, y2 * scale);
            ctx.closePath();
            if (fill) {
                ctx.fillStyle = rgb565ToCSS(color);
                ctx.fill();
            } else {
                ctx.strokeStyle = rgb565ToCSS(color);
                ctx.lineWidth = scale;
                ctx.stroke();
            }
            // log(`TRIANGLE fill=${fill}`);
            return 16;
        }
        case CMD.TEXT: {
            if (data.length < 9) return 0;
            // Check if there's a sync marker in the header bytes - if so, we're desynced
            for (let i = 1; i < Math.min(9, data.length - 4); i++) {
                if (data[i] === 0xFE && data[i+1] === 0x00 && data[i+2] === 0x00 && 
                    data[i+3] === 0xFE && data[i+4] === 0x00) {
                    // Skip silently to sync marker position
                    return i;
                }
            }
            const x = data[1] | (data[2] << 8);
            const y = data[3] | (data[4] << 8);
            const color = data[5] | (data[6] << 8);
            const fontId = data[7];
            const textLen = data[8];
            // Sanity check coordinates and parameters
            if (x > 320 || y > 240 || fontId > 10 || textLen > 100 || textLen === 0) {
                // Invalid parameters - likely not a real TEXT command, skip silently
                return 1;
            }
            if (data.length < 9 + textLen) return 0;
            // Check if text contains sync marker
            for (let i = 9; i < 9 + textLen - 4; i++) {
                if (data[i] === 0xFE && data[i+1] === 0x00 && data[i+2] === 0x00 && 
                    data[i+3] === 0xFE && data[i+4] === 0x00) {
                    // Skip silently to sync marker
                    return i;
                }
            }
            const text = String.fromCharCode.apply(null, data.slice(9, 9 + textLen));
            drawText(fontId, text, x, y, color);
            // Don't log TEXT - too frequent
            return 9 + textLen;
        }
        case CMD.CLEAR: {
            if (data.length < 3) return 0;
            const color = data[1] | (data[2] << 8);
            ctx.fillStyle = rgb565ToCSS(color);
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // log(`CLEAR color=${color.toString(16)}`);
            frameCount++;
            return 3;
        }
        case CMD.BITMAP: {
            // CMD_BITMAP: 09 x:2 y:2 w:2 h:2 color:2 dataLen:2 data...
            if (data.length < 13) return 0;
            const x = data[1] | (data[2] << 8);
            const y = data[3] | (data[4] << 8);
            const w = data[5] | (data[6] << 8);
            const h = data[7] | (data[8] << 8);
            const color = data[9] | (data[10] << 8);
            const dataLen = data[11] | (data[12] << 8);
            if (data.length < 13 + dataLen) return 0;
            
            // Draw 1-bit packed bitmap
            const cssColor = rgb565ToCSS(color);
            ctx.fillStyle = cssColor;
            let byteIdx = 13;
            let bitIdx = 7;
            for (let py = 0; py < h; py++) {
                for (let px = 0; px < w; px++) {
                    const bit = (data[byteIdx] >> bitIdx) & 1;
                    if (bit) {
                        ctx.fillRect((x + px) * scale, (y + py) * scale, scale, scale);
                    }
                    bitIdx--;
                    if (bitIdx < 0) {
                        bitIdx = 7;
                        byteIdx++;
                    }
                }
                // Each row starts at a new byte
                if (bitIdx !== 7) {
                    bitIdx = 7;
                    byteIdx++;
                }
            }
            // log(`BITMAP x=${x} y=${y} w=${w} h=${h} len=${dataLen}`);
            return 13 + dataLen;
        }
        case CMD.SYNC: {
            // Sync marker: FE 00 00 FE 00
            if (data.length < 5) return 0;
            if (data[1] === 0x00 && data[2] === 0x00 && data[3] === 0xFE && data[4] === 0x00) {
                // Don't log every sync marker - too noisy
                // log('SYNC marker received');
                unknownOpcodeCount = 0;  // Reset error counter
                return 5;
            }
            // 0xFE followed by non-sync pattern - likely just a data byte 0xFE, not a real sync attempt
            // Don't increment error count, just skip the byte silently
            return 1;
        }
        case CMD.LED_STATE: {
            // LED_STATE: ledId:1 state:1
            if (data.length < 3) return 0;
            const ledId = data[1];
            const state = data[2];
            handleLedState(ledId, state !== 0);
            return 3;
        }
        case CMD.KEY_EVENT: {
            // KEY_EVENT: index:2 pressed:1 type:1
            if (data.length < 5) return 0;
            const keyIndex = data[1] | (data[2] << 8);
            const pressed = data[3] !== 0;
            const keyType = data[4];
            handleKeyEvent(keyIndex, pressed, keyType);
            return 5;
        }
        case CMD.ENCODER: {
            // ENCODER: encoderId:1 clockwise:1
            if (data.length < 3) return 0;
            const encoderId = data[1];
            const clockwise = data[2] !== 0;
            handleEncoderEvent(encoderId, clockwise);
            return 3;
        }
        case CMD.FADER: {
            // FADER: percent:1
            if (data.length < 2) return 0;
            const percent = data[1];
            handleFaderPosition(percent);
            return 2;
        }
        default:
            // 0x00 bytes are common when desynced - skip silently
            if (opcode === 0x00) {
                return 1;
            }
            // Printable ASCII (0x20-0x7E) is likely debug text leaking through - skip silently
            // This includes letters, numbers, spaces, punctuation
            if (opcode >= 0x20 && opcode <= 0x7E) {
                // Skip entire ASCII text sequence silently
                let skipLen = 1;
                while (skipLen < data.length && data[skipLen] >= 0x20 && data[skipLen] <= 0x7E) {
                    skipLen++;
                }
                // Also skip common line endings (\r\n)
                while (skipLen < data.length && (data[skipLen] === 0x0A || data[skipLen] === 0x0D)) {
                    skipLen++;
                }
                return skipLen;
            }
            // CR/LF characters - skip silently (line endings from debug prints)
            if (opcode === 0x0A || opcode === 0x0D) {
                return 1;
            }
            unknownOpcodeCount++;
            log(`Unknown opcode: 0x${opcode.toString(16)}`, 'error');
            return 1; // Skip unknown byte, processData handles resync
    }
}

// Find initial sync marker (STR\x01) in buffer
function findSyncMarker(buf) {
    for (let i = 0; i <= buf.length - SYNC_MARKER.length; i++) {
        let match = true;
        for (let j = 0; j < SYNC_MARKER.length; j++) {
            if (buf[i + j] !== SYNC_MARKER[j]) {
                match = false;
                break;
            }
        }
        if (match) return i;
    }
    return -1;
}

// Find periodic sync marker (FE 00 00 FE 00) in buffer
function findPeriodicSync(buf) {
    const marker = [0xFE, 0x00, 0x00, 0xFE, 0x00];
    for (let i = 0; i <= buf.length - marker.length; i++) {
        let match = true;
        for (let j = 0; j < marker.length; j++) {
            if (buf[i + j] !== marker[j]) {
                match = false;
                break;
            }
        }
        if (match) return i;
    }
    return -1;
}

// Process incoming data
function processData(data) {
    byteCount += data.length;
    
    // Append new data to buffer
    const newBuffer = new Uint8Array(buffer.length + data.length);
    newBuffer.set(buffer);
    newBuffer.set(data, buffer.length);
    buffer = newBuffer;
    
    // Wait for initial sync marker before processing commands
    if (!synced) {
        // log(`Waiting for sync, buffer len=${buffer.length}`, 'text');
        const syncPos = findSyncMarker(buffer);
        if (syncPos >= 0) {
            // Found sync marker, skip everything before + marker itself
            buffer = buffer.slice(syncPos + SYNC_MARKER.length);
            synced = true;
            unknownOpcodeCount = 0;
            log('SYNCED - Stream started', 'text');
            setStatus('Streaming active', 'success');
        } else {
            // Keep last 3 bytes in case sync spans chunks
            if (buffer.length > 3) {
                buffer = buffer.slice(buffer.length - 3);
            }
            return;
        }
    }
    
    // Proactive sync detection: if first byte isn't a valid opcode but we have a sync marker
    // in the first 20 bytes, skip to it to avoid misinterpreting sync bytes as command data
    const validOpcodes = [CMD.FILL_RECT, CMD.LINE, CMD.PIXEL, CMD.HLINE, CMD.VLINE, 
                          CMD.CIRCLE, CMD.TRIANGLE, CMD.TEXT, CMD.BITMAP, CMD.CLEAR, CMD.SYNC,
                          CMD.LED_STATE, CMD.KEY_EVENT, CMD.ENCODER, CMD.FADER];
    if (buffer.length > 5) {
        const syncPos = findPeriodicSync(buffer.slice(0, Math.min(buffer.length, 30)));
        if (syncPos > 0 && syncPos < 20) {
            // There's a sync marker ahead - check if current opcode looks valid
            if (!validOpcodes.includes(buffer[0]) || buffer[0] === 0x00) {
                log(`Proactive resync: skipping ${syncPos} bytes to sync marker`, 'text');
                buffer = buffer.slice(syncPos + 5);
            }
        }
    }
    
    // Process as many complete commands as possible
    let consumed;
    while ((consumed = processCommand(buffer)) > 0) {
        buffer = buffer.slice(consumed);
        
        // If we hit errors, stop processing and try to resync
        if (unknownOpcodeCount >= RESYNC_THRESHOLD) {
            const syncPos = findPeriodicSync(buffer);
            if (syncPos >= 0) {
                log(`RESYNC: found sync at offset ${syncPos}, discarding ${syncPos} bytes`, 'error');
                buffer = buffer.slice(syncPos + 5);  // Skip past sync marker
                unknownOpcodeCount = 0;
            } else {
                // No sync yet, wait for more data
                break;
            }
        }
    }
}

// Serial communication
async function connect() {
    try {
        log('Requesting serial port...', 'text');
        port = await navigator.serial.requestPort();
        log('Opening port at 57600 baud...', 'text');
        await port.open({ baudRate: 57600 });
        
        document.getElementById('connectBtn').textContent = 'Disconnect';
        document.getElementById('connectBtn').classList.add('connected');
        document.getElementById('saveBtn').style.display = 'block';
        setStatus('Connected! Sending start command...', 'success');
        log('Port opened, sending STR command...', 'text');
        
        // Send start streaming command
        const encoder = new TextEncoder();
        const writer = port.writable.getWriter();
        await writer.write(encoder.encode('STR'));
        writer.releaseLock();
        log('STR command sent, starting read loop...', 'text');
        
        isStreaming = true;
        readLoop();
    } catch (e) {
        log('Connection error: ' + e.message, 'error');
        setStatus('Connection failed: ' + e.message, 'error');
    }
}

async function disconnect() {
    if (!port) return;
    
    try {
        // Send stop command
        const encoder = new TextEncoder();
        const writer = port.writable.getWriter();
        await writer.write(encoder.encode('STP'));
        writer.releaseLock();
        
        isStreaming = false;
        synced = false;
        buffer = new Uint8Array(0);
        if (reader) {
            await reader.cancel();
            reader = null;
        }
        await port.close();
        port = null;
        
        document.getElementById('connectBtn').textContent = 'Connect';
        document.getElementById('connectBtn').classList.remove('connected');
        document.getElementById('saveBtn').style.display = 'none';
        setStatus('Disconnected', 'info');
    } catch (e) {
        setStatus('Disconnect error: ' + e.message, 'error');
    }
}

async function readLoop() {
    log('readLoop started', 'text');
    while (port && isStreaming) {
        try {
            log('Getting reader...', 'text');
            reader = port.readable.getReader();
            log('Waiting for data...', 'text');
            while (true) {
                const { value, done } = await reader.read();
                if (done || !isStreaming) {
                    log('Read loop ended: done=' + done + ' isStreaming=' + isStreaming, 'text');
                    break;
                }
                if (value) processData(value);
            }
            reader.releaseLock();
        } catch (e) {
            if (isStreaming) {
                log('Read error: ' + e.message, 'error');
                setStatus('Read error: ' + e.message, 'error');
            }
        }
    }
    log('readLoop exited', 'text');
}

    // Status display removed
}

// Load device SVG and position canvas over screen area
async function loadDeviceSVG() {
    const container = document.getElementById('deviceContainer');
    
    try {
        const response = await fetch('device.svg');
        const svgText = await response.text();
        
        // Create a div to hold the SVG
        const svgWrapper = document.createElement('div');
        svgWrapper.id = 'deviceSvgWrapper';
        svgWrapper.innerHTML = svgText;
        
        // Insert SVG before the canvas
        const canvas = document.getElementById('screen');
        container.insertBefore(svgWrapper, canvas);
        
        // Get the SVG element and set it to scale properly
        const svgEl = svgWrapper.querySelector('svg');
        if (svgEl) {
            // Store original viewBox dimensions
            const viewBox = svgEl.viewBox.baseVal;
            const svgWidth = viewBox.width || parseFloat(svgEl.getAttribute('width')) || 1024;
            const svgHeight = viewBox.height || parseFloat(svgEl.getAttribute('height')) || 536;
            
            // Set SVG to fill container
            svgEl.style.width = '100%';
            svgEl.style.height = 'auto';
            svgEl.style.display = 'block';
            
            // Position canvas over screen-area
            // Screen area in SVG: x=492, y=80, width=320, height=240
            const screenX = 492;
            const screenY = 80;
            const screenW = 320;
            const screenH = 240;
            
            // Function to update canvas position based on SVG size
            function updateCanvasPosition() {
                const rect = svgEl.getBoundingClientRect();
                const scaleX = rect.width / svgWidth;
                const scaleY = rect.height / svgHeight;
                
                canvas.style.position = 'absolute';
                canvas.style.left = (screenX * scaleX) + 'px';
                canvas.style.top = (screenY * scaleY) + 'px';
                canvas.style.width = (screenW * scaleX) + 'px';
                canvas.style.height = (screenH * scaleY) + 'px';
            }
            
            // Initial position
            updateCanvasPosition();
            
            // Update on resize
            window.addEventListener('resize', updateCanvasPosition);
            
            // Initialize all LEDs to off state
            Object.values(LED_MAP).forEach(svgId => {
                const el = document.getElementById(svgId);
                if (el) el.classList.add('led-off');
            });
        }
        
        log('Device SVG loaded', 'text');
    } catch (e) {
        log('Failed to load device.svg: ' + e.message, 'error');
    }
}

// Initialize device view on page load
loadDeviceSVG();

// Event handlers
document.getElementById('connectBtn').addEventListener('click', () => {
    if (port) {
        disconnect();
    } else {
        connect();
    }
});

document.getElementById('saveBtn').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = `screen-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
});

// Check WebSerial support
if (!('serial' in navigator)) {
    setStatus('WebSerial not supported. Use Chrome/Edge with HTTPS or localhost.', 'error');
    document.getElementById('connectBtn').disabled = true;
}
